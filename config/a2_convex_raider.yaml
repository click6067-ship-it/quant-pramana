# PRAMANA A2 v3 — Convex Raider (discretionary-systematic hybrid: 규칙 + LLM 판단 + 사용자 승인 + paper ledger)
label: "discretionary-systematic hybrid paper book (검증된 알파 아님)"
capital: 100000000
inception: "2026-05-12"
spy_excluded: true
dynamic_mode_enabled: true     # 동적 비중 = position-sizing alpha 실험 (코어 전환 아님). config로 OFF 비교 가능.

# ── A2-T (TQQQ 사용·QQQ/TQQQ 동적) ──
allocation_a2t:
  base:           {qqq: 0.35, tqqq: 0.35}
  berserker:      {qqq: 0.30, tqqq: 0.45}
  red_king:       {qqq: 0.40, tqqq: 0.25}
  attack_lockout: {qqq: 0.35, tqqq: 0.35}
  crash_lockout:  {qqq: 0.35, tqqq: 0.10}

# ── A2-Q (TQQQ 없음·QQQ 중심 공격형·shadow 비교) ──
allocation_a2q:
  base:           {qqq: 0.55, tqqq: 0.0}
  berserker:      {qqq: 0.60, tqqq: 0.0}
  red_king:       {qqq: 0.40, tqqq: 0.0}
  attack_lockout: {qqq: 0.55, tqqq: 0.0}
  crash_lockout:  {qqq: 0.30, tqqq: 0.0}

# ── sleeve 허용범위 (rule engine clamp·LLM은 신호만·숫자는 룰) ──
sleeve_ranges:
  qqq: [0.25, 0.45]
  tqqq: [0.15, 0.45]
  attack: [0.0, 0.20]
  moonshot: [0.0, 0.15]
  vault: [0.05, 0.30]

daily_max_shift_pp: 0.05       # 1회·하루 최대 5%p (용하 지시)
weekly_max_shift_pp: 0.10      # 주간 최대 10%p
leadership: {green_max: 10, yellow_max: 20}
tqqq_decay: {qqq_20d_range: 0.03, vol_threshold: 0.25}
beta_governor_warn: 1.6

# ── Profit Vault = alpha-timing engine (고정 기계 아님) ──
vault:
  base_pct: 0.10
  vault_in:                    # 이겼고 + 위험 커지면 뺀다
    excess_pp: 0.04
    tqqq_profit_pct: 0.20
    attack_R: 2
    moonshot_x: 2
    risk_yellow_red: true      # Leadership/Decay/Narrative YELLOW·RED도 트리거
  thresholds:
    - {excess: 0.04, rate: 0.25}
    - {excess: 0.08, rate: 0.25}
    - {excess: 0.12, rate: 0.50}
  hard_ratio: 0.70             # Hard = 절대 재투입 금지
  reload_ratio: 0.30           # Reload만 재장전
  vault_out:                   # 위험 줄고 + 새 기회면 Reload만
    leadership_green: true
    decay_green: true
    qqq_above_ma20: true
  max_monthly_move_pct: 0.10

naive_benchmark: {qqq: 0.35, tqqq: 0.35}
verdict: {horizon_months: 12, must_beat: ["naive", "qqq", "a2q"]}   # A2-T는 QQQ·naive·A2-Q 다 이겨야 TQQQ+동적이 값을 함
